services:
  - type: web
    name: lifeline-ai-backend
    env: node
    plan: starter
    region: oregon
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/src/index.js
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://lifeline-ai-eta.vercel.app/
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: QR_SECRET
        sync: false
