version: '3.9'

services:
  # MongoDB - Primary Database
  mongo:
    image: mongo:7.0-alpine
    container_name: lifeline-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: lifeline-dev
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lifeline-network
    restart: unless-stopped

  # Redis - Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: lifeline-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lifeline-network
    restart: unless-stopped

  # Backend API Server
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
    container_name: lifeline-backend
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://admin:password123@mongo:27017/lifeline-dev
      REDIS_URL: redis://:redis123@redis:6379
      JWT_SECRET: dev-secret-key-change-in-production
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AI_SERVICE_URL: http://ai-services:8000
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend/src:/app/src
      - ../backend/node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lifeline-network
    restart: unless-stopped
    command: npm run dev

  # Frontend Application
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
    container_name: lifeline-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3000
      NEXT_PUBLIC_MAPBOX_TOKEN: ${NEXT_PUBLIC_MAPBOX_TOKEN}
    ports:
      - "3001:3000"
    depends_on:
      - backend
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lifeline-network
    restart: unless-stopped
    command: npm run dev

  # AI Services (Python)
  ai-services:
    build:
      context: ../ai-services
      dockerfile: Dockerfile
    container_name: lifeline-ai-services
    environment:
      PYTHON_ENV: development
      PORT: 8000
      MONGODB_URI: mongodb://admin:password123@mongo:27017/lifeline-ai
      REDIS_URL: redis://:redis123@redis:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../ai-services/src:/app/src
      - ../ai-services/notebooks:/app/notebooks
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lifeline-network
    restart: unless-stopped
    command: python app.py

  # Nginx - Reverse Proxy & Load Balancer (Optional, for production-like setup)
  nginx:
    image: nginx:alpine
    container_name: lifeline-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - lifeline-network
    restart: unless-stopped
    profiles:
      - production-like

  # Adminer - Database Management UI (Optional)
  adminer:
    image: adminer
    container_name: lifeline-adminer
    ports:
      - "8081:8080"
    depends_on:
      - mongo
    networks:
      - lifeline-network
    restart: unless-stopped
    profiles:
      - debug

  # Mongo Express - MongoDB UI (Optional)
  mongo-express:
    image: mongo-express:latest
    container_name: lifeline-mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_URL: mongodb://admin:password123@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8082:8081"
    depends_on:
      - mongo
    networks:
      - lifeline-network
    restart: unless-stopped
    profiles:
      - debug

  # Redis Commander - Redis UI (Optional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: lifeline-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:redis123
    ports:
      - "8083:8081"
    depends_on:
      - redis
    networks:
      - lifeline-network
    restart: unless-stopped
    profiles:
      - debug

volumes:
  mongo_data:
    driver: local
  mongo_config:
    driver: local
  redis_data:
    driver: local

networks:
  lifeline-network:
    driver: bridge
